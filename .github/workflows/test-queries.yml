name: Tests

on:
  # Automatic triggers are disabled in this fork so only Sync upstream runs
  # on its own.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-build-${{ github.ref }}

jobs:
  check_compilation:
    name: Build
    uses: ./.github/workflows/test-core.yml
    with:
      type: "build"
