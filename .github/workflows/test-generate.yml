name: Tests

on:
  # Automatic triggers are disabled in this fork so only Sync upstream runs
  # on its own.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-generate-${{ github.ref }}

jobs:
  check_compilation:
    name: Generate
    uses: ./.github/workflows/test-core.yml
    with:
      type: "generate"
